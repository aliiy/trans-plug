# sentrux architectural rules for trans-plug (Chrome Extension)
# Run: sentrux check .

[constraints]
max_cycles = 0
max_coupling = "B"
no_god_files = true

# Layer architecture (sentrux: lower order = upper layer, can depend on higher-order layers)
# Feature modules (order 0) → Shared utils (order 2)
# Feature modules must not depend on each other

[[layers]]
name = "content"
paths = ["src/content/*"]
order = 0

[[layers]]
name = "popup"
paths = ["src/popup/*"]
order = 0

[[layers]]
name = "background"
paths = ["src/background/*"]
order = 0

[[layers]]
name = "utils"
paths = ["src/utils/*"]
order = 2

# Content/Popup/Background must not depend on each other
[[boundaries]]
from = "src/content/*"
to = "src/popup/*"
reason = "Content script and popup run in isolated contexts"

[[boundaries]]
from = "src/content/*"
to = "src/background/*"
reason = "Content script communicates via chrome.tabs.sendMessage, not direct imports"

[[boundaries]]
from = "src/popup/*"
to = "src/content/*"
reason = "Popup communicates via chrome.tabs.sendMessage, not direct imports"

[[boundaries]]
from = "src/popup/*"
to = "src/background/*"
reason = "Popup communicates via chrome.runtime, not direct imports"

[[boundaries]]
from = "src/background/*"
to = "src/content/*"
reason = "Service worker communicates via chrome.tabs.sendMessage, not direct imports"

[[boundaries]]
from = "src/background/*"
to = "src/popup/*"
reason = "Service worker communicates via chrome.runtime, not direct imports"

# Utils must not depend on feature modules
[[boundaries]]
from = "src/utils/*"
to = "src/content/*"
reason = "Utilities are shared and must remain context-agnostic"

[[boundaries]]
from = "src/utils/*"
to = "src/popup/*"
reason = "Utilities are shared and must remain context-agnostic"

[[boundaries]]
from = "src/utils/*"
to = "src/background/*"
reason = "Utilities are shared and must remain context-agnostic"
